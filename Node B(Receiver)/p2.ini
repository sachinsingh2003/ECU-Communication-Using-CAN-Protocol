/* p1.ini */

DEFINE BUTTON "HEADLIGHT_OFF", "sendmsg(1)"
DEFINE BUTTON "HEADLIGHT_ON",  "sendmsg(2)"
DEFINE BUTTON "RIGHT_OFF",     "sendmsg(3)"
DEFINE BUTTON "RIGHT_ON",      "sendmsg(4)"
DEFINE BUTTON "LEFT_OFF",      "sendmsg(5)"
DEFINE BUTTON "LEFT_ON",       "sendmsg(6)"

func void sendmsg(unsigned char arg)
{
  switch(arg)
  {
    case 1:   // Headlight OFF
      CAN1ID = 0x501;
      CAN1L  = 1;          // DLC = 1
      CAN1B0 = 0x10;
      CAN1IN = 1;
      break;

    case 2:   // Headlight ON
      CAN1ID = 0x501;
      CAN1L  = 1;
      CAN1B0 = 0x11;
      CAN1IN = 1;
      break;

    case 3:   // Right Indicator OFF
      CAN1ID = 0x502;
      CAN1L  = 1;
      CAN1B0 = 0x12;
      CAN1IN = 1;
      break;

    case 4:   // Right Indicator ON
      CAN1ID = 0x502;
      CAN1L  = 1;
      CAN1B0 = 0x13;
      CAN1IN = 1;
      break;

    case 5:   // Left Indicator OFF
      CAN1ID = 0x503;
      CAN1L  = 1;
      CAN1B0 = 0x14;
      CAN1IN = 1;
      break;

    case 6:   // Left Indicator ON
      CAN1ID = 0x503;
      CAN1L  = 1;
      CAN1B0 = 0x15;
      CAN1IN = 1;
      break;
  }
}